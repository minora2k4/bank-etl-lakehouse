transactions:
  required_columns:
    - transaction_id
    - account_id
    - customer_id
    - transaction_time
    - amount_vnd
    - status
    - channel
  not_null:
    - transaction_id
    - account_id
    - customer_id
    - transaction_time
    - amount_vnd
  unique:
    - transaction_id
  valid_values:
    status: [SUCCESS, FAILED, PENDING]
    channel: [VPBANK_NEO, NAPAS_QR, ATM, POS, BRANCH, INTERNET_BANKING]
    currency: [VND]
  numeric_rules:
    amount_vnd:
      min: 1
  timestamp_rules:
    transaction_time:
      not_future: true
