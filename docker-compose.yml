services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHON_BIN=python
      - CUSTOMERS=${CUSTOMERS:-1000}
      - TRANSACTIONS=${TRANSACTIONS:-10000}
      - DATA_DIR=/workspace/data
      - LAKEHOUSE_DIR=/workspace/lakehouse
      - DASHBOARD_DIR=/workspace/dashboard
      - DOCS_DIR=/workspace/docs
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
      - runtime_docs:/workspace/docs
      - ./dashboard:/workspace/dashboard
    depends_on:
      - postgres
      - minio
      - kafka
      - spark-master

  transaction-producer:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONPATH=/app/src
      - DATA_DIR=/workspace/data
      - LAKEHOUSE_DIR=/workspace/lakehouse
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: >
      python -m kafka.producer
      --sink kafka
      --bootstrap-servers kafka:9092
      --topic raw-transactions
      --count ${STREAM_TRANSACTIONS:-100}
      --interval-seconds ${STREAM_INTERVAL_SECONDS:-0.2}
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
    depends_on:
      - kafka

  postgres-transaction-updater:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONPATH=/app/src
      - DATA_DIR=/workspace/data
      - LAKEHOUSE_DIR=/workspace/lakehouse
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=banking
      - POSTGRES_USER=banking
      - POSTGRES_PASSWORD=banking
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: >
      python -m application.postgres_transaction_updater
      --source kafka
      --bootstrap-servers kafka:9092
      --topic clean-transactions
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
    depends_on:
      - kafka
      - postgres

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8083:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=banking-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      - kafka

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    profiles:
      - tools
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_BUCKET=banking-lakehouse
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - runtime_lakehouse:/workspace/lakehouse:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set lakehouse http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
       mc rm --recursive --force lakehouse/$$MINIO_BUCKET || true &&
       mc mb -p lakehouse/$$MINIO_BUCKET &&
       mc mirror --overwrite /workspace/lakehouse lakehouse/$$MINIO_BUCKET/lakehouse"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=banking
      - POSTGRES_USER=banking
      - POSTGRES_PASSWORD=banking
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/resources/postgres:/sql:ro
      - runtime_data:/workspace/data:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@bank.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./configs/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres

  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8082:8080"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
      - ./dashboard:/workspace/dashboard
      - ./src:/workspace/src:ro
      - ./configs:/workspace/configs:ro

  spark-worker:
    image: apache/spark:latest
    container_name: spark-worker
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "1"
      - --memory
      - 1G
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
      - ./dashboard:/workspace/dashboard
      - ./src:/workspace/src:ro
      - ./configs:/workspace/configs:ro

  spark-streaming-validator:
    image: apache/spark:latest
    container_name: spark-streaming-validator
    environment:
      - PYTHONPATH=/workspace/src
      - DATA_DIR=/workspace/data
      - LAKEHOUSE_DIR=/workspace/lakehouse
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      - /workspace/src/spark/streaming_validator.py
      - --mode
      - streaming
      - --bootstrap-servers
      - kafka:9092
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
      - ./src:/workspace/src:ro
      - ./configs:/workspace/configs:ro
    depends_on:
      - kafka
      - spark-master
      - spark-worker

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_DRIVER_MEMORY=2G
      - SPARK_EXECUTOR_MEMORY=2G
    volumes:
      - runtime_data:/workspace/data
      - runtime_lakehouse:/workspace/lakehouse
      - ./dashboard:/workspace/dashboard
      - ./src:/workspace/src:ro
      - ./configs:/workspace/configs:ro
    depends_on:
      - spark-master
      - spark-worker


volumes:
  runtime_data:
  runtime_lakehouse:
  runtime_docs:
  kafka_data:
  minio_data:
  postgres_data:
  pgadmin_data:
